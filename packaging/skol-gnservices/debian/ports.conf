# skol-gnservices ports + concurrency.
#
# Edit and `systemctl restart gnfinder gnparser` to apply.  The
# defaults match what the skol client code (ingestors/gnfinder_client.py
# and ingestors/gnparser_client.py) expects, so changing them here
# also requires updating env_config or whichever caller binds to a
# specific URL.

GNFINDER_PORT=9080
GNPARSER_PORT=9081
# gnparser's per-request thread pool — set to ~ #cores you want to
# give the parser.  8 is a reasonable default for typical hosts.
GNPARSER_JOBS=8
