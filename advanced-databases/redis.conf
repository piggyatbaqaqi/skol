# SKOL Redis Configuration
# Secure configuration with TLS and authentication
#
# See https://redis.io/docs/management/security/ for security best practices.

################################## NETWORK #####################################

# Bind to all interfaces inside the container. TLS provides security.
# For localhost-only access (current setup), Docker handles port binding.
bind 0.0.0.0

# Disable non-TLS port
port 0

# TLS port (this is the only port that accepts connections)
tls-port 6379

# TCP backlog
tcp-backlog 511

# Client timeout (0 = disabled)
timeout 0

# TCP keepalive
tcp-keepalive 300

################################## TLS #########################################

# TLS Certificate Configuration
# These paths are mounted from the host via docker-compose
tls-cert-file /etc/letsencrypt/live/synoptickeyof.life/fullchain.pem
tls-key-file /etc/letsencrypt/live/synoptickeyof.life/privkey.pem

# CA certificate for verifying client certificates
tls-ca-cert-file /etc/ssl/certs/ca-certificates.crt

# Require TLS authentication from clients
# Options: yes (require client cert), no (optional client cert)
# For password-only auth, use 'no' - clients authenticate via ACL password
tls-auth-clients no

# Minimum TLS version (1.2 is the minimum secure version)
tls-protocols "TLSv1.2 TLSv1.3"

# Prefer server cipher order (more secure)
tls-prefer-server-ciphers yes

# Strong cipher suites only
tls-ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256

# TLS for replication links (for future multi-host setup)
tls-replication yes

# TLS for cluster bus (for future cluster setup)
tls-cluster yes

################################## SECURITY ####################################

# Require password authentication
# The password is set via environment variable substitution at container start
# Docker-compose sets REDIS_PASSWORD from the host environment
requirepass PLACEHOLDER_WILL_BE_SET_BY_ENTRYPOINT

# ACL configuration (Redis 6+)
# Default user is disabled for security - must use explicit admin account
user default off nopass ~* &* +@all

# Admin user with full access
# Password set via ACL SETUSER at runtime by entrypoint script
# This is a placeholder - actual password comes from REDIS_PASSWORD env var
user admin on >PLACEHOLDER_WILL_BE_SET_BY_ENTRYPOINT ~* &* +@all

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""

# Protected mode is disabled because:
# 1. TLS is required for all connections
# 2. Password authentication is required (admin user)
# 3. Docker networking makes connections appear non-local, blocking legitimate access
protected-mode no

################################## PERSISTENCE #################################

# Working directory
dir /data

# RDB persistence
dbfilename dump.rdb
rdbcompression yes
rdbchecksum yes

# RDB save triggers: save <seconds> <changes>
save 900 1
save 300 10
save 60 10000

# AOF persistence (more durable than RDB alone)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

################################## MEMORY ######################################

# Eviction policy when memory limit is reached
# allkeys-lru: Remove least recently used keys first
maxmemory-policy allkeys-lru

# Maximum memory (uncomment and adjust based on available RAM)
# maxmemory 2gb

################################## LOGGING #####################################

# Log level: debug, verbose, notice, warning
loglevel notice

# Log to stdout (for Docker logging)
logfile ""

################################## CLIENTS #####################################

# Maximum number of connected clients
maxclients 10000

################################################################################
# FUTURE: REPLICATION CONFIGURATION
#
# To add a replica on another host:
# 1. Copy this config to the replica server
# 2. Uncomment and configure the replica settings below
# 3. Ensure TLS certificates are valid on both hosts
################################################################################

# # On the REPLICA server only, set the master address:
# replicaof <master-ip> 6379
#
# # Authentication to connect to master
# masterauth <master-password>
# masteruser admin
#
# # Replica serves stale data during sync (recommended for availability)
# replica-serve-stale-data yes
#
# # Replica is read-only (strongly recommended)
# replica-read-only yes
#
# # Replication timeout in seconds
# repl-timeout 60
#
# # Diskless replication (faster for slow disks, uses more bandwidth)
# repl-diskless-sync yes
# repl-diskless-sync-delay 5

################################################################################
# CLUSTER CONFIGURATION
#
# Cluster mode is opt-in via REDIS_CLUSTER_ENABLED in the container env
# (handled by redis-entrypoint.sh, defaults to 'no').  When 'yes' the
# entrypoint also runs CLUSTER ADDSLOTSRANGE 0 16383 on first start so
# this node owns all 16384 hash slots — a single-node cluster.  Adding
# a second node later: CLUSTER MEET on one of them, then redistribute
# slots with CLUSTER RESHARD.
################################################################################

# Enable cluster mode (yes/no — substituted by entrypoint)
cluster-enabled PLACEHOLDER_CLUSTER_ENABLED

# Cluster topology state file (auto-managed by Redis under `dir`)
cluster-config-file nodes.conf

# How long before a node is considered unreachable.  Default 15000 ms.
cluster-node-timeout 15000

# If any slot is unassigned or unreachable, all writes fail.  This is
# what we want — silent partial-keyspace serving would mask bugs.
cluster-require-full-coverage yes

# Address this node advertises to clients via CLUSTER NODES.  Clients
# use this for MOVED redirects, so it must be the address they can
# actually reach this node at — not the in-container address.
# For single-node-cluster on localhost (Phase 1): 127.0.0.1.
# For LAN clients (Phase 2): the LAN hostname (e.g. 'tsqali') and the
# host-side port that docker-compose maps to.
#
# Two announce-port settings, because Redis has separate ones for the
# plain-TCP and TLS data ports — and which one gets used depends on
# whether 'tls-cluster yes' is set (it is, above).  In TLS-cluster
# mode it's cluster-announce-TLS-port that's emitted in CLUSTER NODES,
# NOT cluster-announce-port.  The latter is set for completeness in
# case 'tls-cluster' is ever flipped to no.  Default for the TLS one
# (if unset) is tls-port (6379 inside the container), which is wrong
# when there's a port-translation layer (docker-compose mapping, SSH
# reverse tunnel) between the cluster and its clients.
cluster-announce-ip PLACEHOLDER_CLUSTER_ANNOUNCE_IP
cluster-announce-port PLACEHOLDER_CLUSTER_ANNOUNCE_PORT
cluster-announce-tls-port PLACEHOLDER_CLUSTER_ANNOUNCE_TLS_PORT
cluster-announce-bus-port PLACEHOLDER_CLUSTER_ANNOUNCE_BUS_PORT

################################################################################
# PROTOCOL LIMITS
################################################################################
#
# Maximum size of a single bulk-string payload (one SET, one HSET field, etc.).
# Raised from the 512 MB default to the protocol max (4 GB - 1 byte) for
# bin/embed_treatments.py.  Two compounding factors made the default insufficient
# on v3_hand:
#   * Per-treatment ingest payloads were ~260 KB each (full source CouchDB doc
#     duplicated 1-to-many) — now slimmed to ~110 B in commit 33f0654, so the
#     embedding pickle dropped from 4+ GB to ~100 MB.
#   * The chunked-write fallback in embed_treatments uses SETRANGE, but Redis
#     enforces proto-max-bulk-len on the *resulting* string size — so the
#     fallback couldn't recover from an oversize initial write either.
# Even with the slimming the headroom is welcome: as treatments grow toward
# 50k+ entries the embedding matrix will scale linearly.
proto-max-bulk-len 4294967295
