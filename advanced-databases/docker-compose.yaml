##### services #####
services:

  # redisinsight
  redisinsight:
    image: redis/redisinsight:latest
    restart: always
    hostname: redisinsight
    environment:
      # Redis connection (TLS enabled)
      REDIS_PORT: "6379"
      REDIS_HOST: "redis"
      # RedisInsight web interface TLS
      RI_SERVER_TLS_KEY: /etc/letsencrypt/live/synoptickeyof.life/privkey.pem
      RI_SERVER_TLS_CERT: /etc/letsencrypt/live/synoptickeyof.life/fullchain.pem
    ports:
      - 5540:5540
    depends_on:
      - redis
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /etc/ssl:/etc/ssl

  # neo4j#
  neo4j:
    image: docker.io/neo4j:5.26 #5.15
    restart: always
    hostname: neo4j
    ports:
    #  - "7474:7474" #http
      - "7473:7473" #https
      - "7687:7687" #bolt
    environment:
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_AUTH=none
      - NEO4J_PLUGINS='["apoc", "graph-data-science"]'
      - NEO4J_dbms_memory_pagecache_size=1G
      # - "NEO4J_dbms_directories_plugins=/plugins"
      # - "NEO4J_dbms_security_procedures_unrestricted=algo.*,apoc.*,gds.*"
    volumes:
      - /data/skol/neo4j/data:/data
      # - ./neo4j-plugins:/plugins
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/ssl:/etc/ssl:ro
      - /usr/share/ca-certificates:/usr/share/ca-certificates:ro
      - /opt/skol/advanced-databases/neo4j/conf:/var/lib/neo4j/conf:ro
      - /opt/skol/advanced-databases/neo4j/certificates:/var/lib/neo4j/certificates:ro

  #redis#
  redis:
    image: docker.io/redis:7.4
    restart: always
    hostname: redis
    entrypoint: ["/usr/local/bin/redis-entrypoint.sh"]
    env_file:
      - /home/skol/.skol_env
    ports:
      # Loopback on 6380 — preserves local clients (skol bin/ scripts,
      # Django) that hit 127.0.0.1:6380 directly.
      - "127.0.0.1:6380:6379"
      # LAN exposure on the standard Redis port for cross-host cluster
      # clients (Phase 2 verification + Phase 4 prod-skol → tsqali
      # cutover).  TLS-ONLY inside the container: redis.conf has
      # ``port 0`` (plain TCP listener disabled) and ``tls-port 6379``
      # (only TLS listens), so binding to 0.0.0.0 exposes no
      # clear-text endpoint on a routable address.  Auth is mandatory
      # too (requirepass + ACL admin user).
      - "0.0.0.0:6379:6379"
      # Cluster bus port — TLS (tls-cluster yes in redis.conf).  Only
      # opened by Redis when REDIS_CLUSTER_ENABLED=yes, so mapping it
      # unconditionally is a no-op on non-cluster hosts.
      - "0.0.0.0:16379:16379"
    volumes:
      - /data/skol/redis/data:/data
      - /opt/skol/advanced-databases/redis.conf:/usr/local/etc/redis/redis.conf.template:ro
      - /opt/skol/advanced-databases/redis-entrypoint.sh:/usr/local/bin/redis-entrypoint.sh:ro
      # TLS certificates
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/ssl:/etc/ssl:ro

  #couchdb_skol#
  couchdb_skol:
    image: couchdb:3.4
    restart: always
    # Host networking so the replicator can reach LAN peers (e.g.
    # the new CouchDB at 10.42.0.99).  5984 is still constrained to
    # 127.0.0.1 — enforced by chttpd.bind_address in local.ini,
    # since Docker port mappings are ignored under host networking.
    network_mode: host
    env_file:
      - /home/skol/.skol_env
    environment:
      # COUCHDB_USER and COUCHDB_PASSWORD are read from .skol_env
      - COUCHDB_USER=admin
    volumes:
      - /data/skol/couchdb/data:/opt/couchdb/data
      - /data/skol/couchdb/etc:/opt/couchdb/etc
      - /etc/letsencrypt:/etc/letsencrypt
      - /etc/ssl:/etc/ssl

##### networks #####
networks:
  default:
    name: local
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
          gateway: 10.10.10.1

